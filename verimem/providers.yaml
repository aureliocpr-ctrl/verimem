# Provider registry — single source of truth.
#
# Each entry is parsed as `ProviderSpec` (see hippoagent/provider_registry.py).
# Required fields:
#   name              canonical identifier (lowercase, no spaces).
#   env               name of the env var that holds the API key (or empty for ollama).
#   base_url          default OpenAI-compatible endpoint (or empty for native SDKs).
#   default_model     fallback model id when HIPPO_MODEL not set.
#   family            one of {anthropic, openai_compat, ollama, mock} — selects adapter.
#   supports_tools    whether the provider exposes native tool-use.
#   supports_vision   whether the provider accepts image inputs.
# Optional:
#   base_url_env      env var name that overrides base_url at runtime.
#   aliases           list of user-friendly names that resolve to this entry.
#   recommended_models  curated list shown in the UI selector. Each entry has:
#                     id, label, tier (frontier/mid/fast/reasoning/coder/small),
#                     notes, optional capability overrides.
#
# Last refreshed: 2026-05-08 — model ids verified against each provider's
# official documentation as of that date. Re-check periodically; cloud
# providers rotate flagship ids (Anthropic moved to dateless ids from the
# 4.6 generation onward, OpenAI keeps date-suffixed snapshots).

providers:
  # ---- Anthropic — native SDK -------------------------------------------
  - name: anthropic
    env: ANTHROPIC_API_KEY
    base_url: ""
    default_model: claude-haiku-4-5-20251001
    family: anthropic
    supports_tools: true
    supports_vision: true
    aliases: [claude]
    recommended_models:
      - id: claude-opus-4-7
        label: "Claude Opus 4.7"
        tier: frontier
        notes: "MCP-Atlas leader (77.3%); SWE-bench Pro 64.3%. Best for tool-heavy coding agents."
        supports_reasoning: true
      - id: claude-sonnet-4-6
        label: "Claude Sonnet 4.6"
        tier: mid
        notes: "Balanced quality/speed. Released Feb 2026."
        supports_reasoning: true
      - id: claude-haiku-4-5-20251001
        label: "Claude Haiku 4.5"
        tier: fast
        notes: "Fastest/cheapest Claude 4. Pinned snapshot."

  # ---- OpenAI ----------------------------------------------------------
  - name: openai
    env: OPENAI_API_KEY
    base_url: https://api.openai.com/v1
    base_url_env: OPENAI_BASE_URL
    default_model: gpt-5.4-mini-2026-03-17
    family: openai_compat
    supports_tools: true
    supports_vision: true
    recommended_models:
      - id: gpt-5.5-2026-04-23
        label: "GPT-5.5"
        tier: frontier
        notes: "Terminal-Bench 2.0 leader (82.7%). Use reasoning.effort={low,medium,high,xhigh}."
        supports_reasoning: true
      - id: gpt-5.4-2026-03-05
        label: "GPT-5.4"
        tier: frontier
        notes: "Frontier for complex professional work; cheaper than 5.5."
        supports_reasoning: true
      - id: gpt-5.4-mini-2026-03-17
        label: "GPT-5.4 mini"
        tier: mid
        notes: "High-volume workloads. Default."
      - id: gpt-5.4-nano-2026-03-17
        label: "GPT-5.4 nano"
        tier: fast
        notes: "Classification, ranking, sub-agents. Cheapest."
      - id: gpt-5-2026-01-15
        label: "GPT-5 (legacy)"
        tier: frontier
        notes: "Initial GPT-5 release. Kept for compatibility with older configs."

  # ---- OpenRouter — gateway to many providers --------------------------
  - name: openrouter
    env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    default_model: anthropic/claude-haiku-4.5
    family: openai_compat
    supports_tools: true
