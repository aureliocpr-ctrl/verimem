        tier: frontier
        notes: "Same model as direct Anthropic; pay-as-you-go if you don't have Anthropic key."
      - id: openai/gpt-5.5
        label: "GPT-5.5 (via OpenRouter)"
        tier: frontier
      - id: deepseek/deepseek-v4-pro
        label: "DeepSeek V4 Pro"
        tier: frontier
        notes: "1.6T MoE, 49B active. Open weights. Cheaper than the closed frontiers."
        supports_reasoning: true
      - id: google/gemini-3.1-pro
        label: "Gemini 3.1 Pro"
        tier: frontier
        notes: "GPQA Diamond leader (94.3%)."
        supports_reasoning: true
      - id: meta-llama/llama-4-scout-17b-instruct
        label: "Llama 4 Scout"
        tier: mid
        notes: "MoE, 17B active / 109B total. Strong long-context."
      - id: qwen/qwen3-235b-a22b
        label: "Qwen 3 235B-A22B"
        tier: frontier
        notes: "Apache 2.0. Top open-source on broad benchmarks."
        supports_reasoning: true
