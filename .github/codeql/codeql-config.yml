# CodeQL configuration — verimem
#
# Scope: we scan the SHIPPED package (`verimem/`). Tests, benchmark
# runners, dev scripts and the demo are not an attack surface of the
# distributed wheel (they never ship; their "flaws" are fixtures and
# fake data by design) — excluding them keeps the alert list equal to
# the code a user actually installs. This is declared, not hidden.
#
# Known per-file FPs are handled by ALERT DISMISSALS (GitHub API/UI),
# NOT here: CodeQL `query-filters` cannot scope a rule to a path (an
# `exclude: {id, paths}` entry is silently inert — verified empirically
# 2026-07-22: the scan applied paths-ignore but left those alerts open).
# Dismissed-with-rationale, each verified on code:
#
# 1. py/path-injection on `verimem/ide.py` (22): all filesystem ops are
#    gated by `_safe_path()` — refuses `..`, drive letters, UNC, `~`,
#    null bytes; enforces resolve()+relative_to(workspace_root)
#    containment. Coverage: tests/test_ide_path_injection.py (8 tests).
#    NOTE: a rename that moves a file re-mints its dismissed alerts
#    under the new path (this bit us on engram/→verimem/) — re-dismiss.
#
# 2. py/undefined-export on `verimem/__init__.py` (3): PEP 562 lazy
#    exports via module `__getattr__`; names ARE defined at access time.

name: verimem-codeql

paths-ignore:
  - "tests"
  - "benchmark"
  - "scripts"
  - "run_demo.py"

queries:
  - uses: security-extended
  - uses: security-and-quality
