# CodeQL configuration — verimem
#
# Scope: we scan the SHIPPED package (`verimem/`). Tests, benchmark
# runners, dev scripts and the demo are not an attack surface of the
# distributed wheel (they never ship; their "flaws" are fixtures and
# fake data by design) — excluding them keeps the alert list equal to
# the code a user actually installs. This is declared, not hidden.
#
# Rule-level filters (each one verified on code, 2026-07-22 triage):
#
# 1. py/path-injection on `verimem/ide.py` (was `engram/ide.py` before
#    the 0.7.0 rename — the stale path silently disabled this filter
#    and resurrected 22 known-FP alerts). ALL filesystem ops there are
#    gated by `_safe_path()`: refuses `..`, drive letters, UNC, `~`,
#    null bytes, and enforces resolve()+relative_to(workspace_root)
#    containment. Coverage: tests/test_ide_path_injection.py (8 tests).
#    CodeQL doesn't recognise the custom sanitizer.
#
# 2. py/undefined-export: `verimem/__init__.py` exports Memory/Client/
#    AutoMemory via PEP 562 module `__getattr__` (lazy imports keep
#    `import verimem` light). The names ARE defined at access time;
#    CodeQL's export check doesn't model PEP 562. Systematic FP.

name: verimem-codeql

paths-ignore:
  - "tests"
  - "benchmark"
  - "scripts"
  - "run_demo.py"

queries:
  - uses: security-extended
  - uses: security-and-quality

query-filters:
  - exclude:
      id: py/path-injection
      paths:
        - "verimem/ide.py"
  - exclude:
      id: py/undefined-export
      paths:
        - "verimem/__init__.py"
