# CodeQL configuration — HippoAgent
#
# Why this file exists:
# CodeQL's Python `py/path-injection` query flags every filesystem
# operation in `engram/ide.py` because the user-provided
# `body.path` flows into `Path.mkdir/touch/...`. This is a false
# positive: ALL such calls are gated by `_safe_path()`, which:
#   1. Refuses `..` segments anywhere in the path.
#   2. Refuses Windows drive letters (`C:/`, `D:\\`).
#   3. Refuses UNC paths (`//host/share`).
#   4. Refuses `~` home expansion.
#   5. Refuses null bytes (truncation attacks).
#   6. Resolves and verifies `relative_to(workspace_root)` containment.
#
# Coverage: tests/test_ide_path_injection.py (8 tests, FORGIA #183).
#
# CodeQL doesn't recognise this custom sanitizer pattern. We
# explicitly exclude the rule for `engram/ide.py` only — every
# other file remains under the standard query suite.

name: hippoagent-codeql

queries:
  - uses: security-extended
  - uses: security-and-quality

# Suppress py/path-injection FPs in ide.py only.
# All filesystem ops go through _safe_path() — see tests.
query-filters:
  - exclude:
      id: py/path-injection
      paths:
        - "engram/ide.py"
