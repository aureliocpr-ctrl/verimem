name: Publish to PyPI (Trusted Publishing — no token)

# Publishes `verimem` on a version tag using PyPI **Trusted Publishing**
# (OpenID Connect). NO API token is stored or typed anywhere — GitHub proves
# the workflow's identity to PyPI via OIDC.
#
# ONE-TIME setup on PyPI (a web form, NOT a token):
#   pypi.org → your account → Publishing → "Add a pending publisher":
#     PyPI Project Name : verimem
#     Owner             : aureliocpr-ctrl
#     Repository name   : verimem
#     Workflow name     : publish.yml
#     Environment name  : (leave blank)
#
# Then publishing is just:  git tag v0.3.0 && git push origin v0.3.0
# (or run this workflow manually via the Actions tab → "Run workflow").

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # REQUIRED for OIDC trusted publishing

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check artifacts
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - name: Publish to PyPI (OIDC — no token)
        uses: pypa/gh-action-pypi-publish@release/v1
